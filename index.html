<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>KFK — Lyspunkter · SVG Lokalcamp 2026</title>

    <!-- Reveal.js core CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css" />

    <style>
      #remote-dialog { border: none; border-radius: 12px; background: #1a1a2e; color: #f0f0f0; padding: 2rem; max-width: 320px; width: 90%; text-align: center; font-family: system-ui, sans-serif; }
      #remote-dialog::backdrop { background: rgba(0,0,0,0.8); }
      #remote-dialog p { font-size: 0.85rem; color: #aaa; margin-bottom: 1rem; }
      #remote-dialog a { color: #7dd3fc; font-size: 0.75rem; word-break: break-all; display: block; margin-top: 1rem; }
      #remote-qr { background: #f0f0f0; padding: 8px; border-radius: 8px; display: inline-block; margin: 0.5rem 0; }
      #remote-close { display: block; margin: 1.2rem auto 0; background: #333; border: none; color: #fff; font-size: 1rem; padding: 0.5rem 1.5rem; border-radius: 6px; cursor: pointer; }
      #remote-close:hover { background: #444; }
      #remote-hint { position: fixed; bottom: 1rem; right: 1rem; font-size: 0.6rem; color: rgba(255,255,255,0.25); font-family: system-ui, sans-serif; pointer-events: none; }

      #fun-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(2px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 9999;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.2s;
      }
      #fun-overlay.visible {
        opacity: 1;
        visibility: visible;
      }
      .fun-emoji {
        font-size: 8rem;
        line-height: 1;
        margin-bottom: 1rem;
      }
      .fun-text {
        font-size: 5rem;
        font-weight: 900;
        color: white;
        text-align: center;
        font-family: system-ui, sans-serif;
        text-shadow: 0 4px 32px rgba(0, 0, 0, 0.5);
      }
      .fun-progress {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 6px;
        width: 100%;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 0 3px 3px 0;
      }
      .fun-progress.animated {
        animation: funProgress 3s linear forwards;
      }
      @keyframes funProgress {
        from { width: 100%; }
        to   { width: 0%; }
      }
      #fun-overlay.visible .fun-emoji {
        animation: funBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes funBounce {
        from { transform: scale(0.3); opacity: 0; }
        to   { transform: scale(1);   opacity: 1; }
      }
    </style>

    <!-- Google Fonts: DM Sans + DM Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

    <!-- Custom theme CSS -->
    <link rel="stylesheet" href="assets/css/theme.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/animations.css" />
    <link rel="stylesheet" href="assets/css/party-bar.css" />
  </head>

  <body>
    <div class="reveal">
      <div class="slides">
        <!-- Slides loaded dynamically by slide-loader.js -->
      </div>
    </div>

    <!-- Remote control dialog (trykk R for å åpne) -->
    <dialog id="remote-dialog">
      <p>Skann for å åpne remote control på mobilen</p>
      <div id="remote-qr"></div>
      <a id="remote-url" href="#" target="_blank"></a>
      <button id="remote-close">Lukk</button>
    </dialog>
    <div id="remote-hint">R = remote</div>

    <div id="party-bar-wrap"></div>

    <div id="audience-qr-corner">
      <div id="audience-qr-corner-code"></div>
      <div id="audience-qr-corner-label">Bli med! 🎮</div>
    </div>

    <div id="fun-overlay">
      <div class="fun-emoji"></div>
      <div class="fun-text"></div>
      <div class="fun-progress"></div>
    </div>

    <!-- Reveal.js core -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>

    <!-- Slide list (single source of truth for slide order) -->
    <script src="assets/js/slides-list.js"></script>

    <!-- Slide loader (loads slides, then initializes) -->
    <script src="assets/js/slide-loader.js"></script>

    <!-- Configuration -->
    <script src="assets/js/config.js"></script>

    <!-- Title slide background animation -->
    <script src="assets/js/title-bg-animation.js"></script>

    <!-- Safe-zone overlay (Z for å toggle) -->
    <script src="assets/js/safe-zone.js"></script>

    <!-- Remote control via PeerJS (WebRTC) -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="assets/js/fun-config.js"></script>
    <script src="assets/js/remote-control.js"></script>
    <script src="assets/js/audience-config.js"></script>
    <script src="assets/js/audience-manager.js"></script>
  </body>
</html>
