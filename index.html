<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>KFK — Lyspunkter · SVG Lokalcamp 2026</title>

    <!-- Reveal.js core CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css" />

    <style>
      #remote-overlay {
        position: fixed; inset: 0; z-index: 9999;
        background: rgba(0,0,0,0.85);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 1.2rem;
        font-family: system-ui, sans-serif;
        color: #f0f0f0;
      }
      #remote-overlay p { font-size: 0.85rem; color: #aaa; }
      #remote-overlay a { color: #7dd3fc; font-size: 0.75rem; word-break: break-all; text-align: center; max-width: 360px; }
      #remote-qr { background: #f0f0f0; padding: 8px; border-radius: 8px; }
      #remote-hint { position: fixed; bottom: 1rem; right: 1rem; font-size: 0.6rem; color: rgba(255,255,255,0.25); font-family: system-ui, sans-serif; pointer-events: none; }
    </style>

    <!-- Custom theme CSS -->
    <link rel="stylesheet" href="assets/css/theme.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/animations.css" />
  </head>

  <body>
    <div class="reveal">
      <div class="slides">
        <!-- Slides loaded dynamically by slide-loader.js -->
      </div>
    </div>

    <!-- Remote control overlay (trykk R for å vise) -->
    <div id="remote-overlay" hidden>
      <p>Skann for å åpne remote control på mobilen</p>
      <div id="remote-qr"></div>
      <a id="remote-url" href="#" target="_blank"></a>
      <p style="font-size:0.75rem;color:#666">Trykk R for å lukke</p>
    </div>
    <div id="remote-hint">R = remote</div>

    <!-- Reveal.js core -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>

    <!-- Slide loader (loads slides, then initializes) -->
    <script src="assets/js/slide-loader.js"></script>

    <!-- Configuration -->
    <script src="assets/js/config.js"></script>

    <!-- Remote control via PeerJS (WebRTC) -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="assets/js/remote-control.js"></script>
  </body>
</html>
