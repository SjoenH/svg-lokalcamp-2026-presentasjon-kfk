<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bli med! — KFK 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    button, input, a, [role="button"] { touch-action: manipulation; }

    body {
      background: #0f0f1a;
      color: #f0f0f0;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ---- Views ---- */
    .view { display: none; width: 100%; max-width: 480px; padding: 24px 16px; }
    .view.active { display: flex; flex-direction: column; align-items: center; }

    h1 { font-size: 1.5rem; font-weight: 900; text-align: center; margin-bottom: 4px; }
    .subtitle { font-size: 0.85rem; color: #888; text-align: center; margin-bottom: 20px; }

    /* ---- Character grid ---- */
    #char-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      margin-bottom: 20px;
    }

    .char-card {
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      border-radius: 12px;
      padding: 12px 6px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.12s, background 0.12s;
      position: relative;
    }
    .char-card.selected {
      border-color: #7dd3fc;
      background: #1a2a3e;
    }
    .char-card.selected::after {
      content: '✓';
      position: absolute;
      top: 5px; right: 7px;
      font-size: 11px;
      font-weight: 900;
      color: #7dd3fc;
    }

    /* Sprite container */
    .char-sprite-wrap {
      width: 48px;
      height: 44px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
    }
    .char-sprite {
      width: 1px;
      height: 1px;
      flex-shrink: 0;
      margin-bottom: 12px;
      image-rendering: pixelated;
    }
    .char-sprite.anim-walk  { animation: csWalk  0.6s ease-in-out infinite; }
    .char-sprite.anim-stomp { animation: csStomp 0.35s steps(1) infinite; }
    .char-sprite.anim-bob   { animation: csBob   0.9s ease-in-out infinite; }
    .char-sprite.anim-hover { animation: csHover 1.4s ease-in-out infinite; }

    @keyframes csWalk  { 0%,100%{transform:scale(2.5) translateY(0)} 50%{transform:scale(2.5) translateY(-1px)} }
    @keyframes csStomp { 0%,100%{transform:scale(2.5) translateY(0)} 50%{transform:scale(2.5) translateY(-2px)} }
    @keyframes csBob   { 0%,100%{transform:scale(2.5) rotate(-6deg)} 50%{transform:scale(2.5) rotate(6deg) translateY(-1px)} }
    @keyframes csHover { 0%,100%{transform:scale(2.5) translateY(0)} 50%{transform:scale(2.5) translateY(-3px)} }

    .char-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #ddd;
      text-align: center;
    }
    .char-desc {
      font-size: 0.6rem;
      color: #666;
      text-align: center;
      line-height: 1.3;
    }

    /* ---- Name input ---- */
    .input-row {
      display: flex;
      gap: 10px;
      width: 100%;
      margin-bottom: 10px;
    }
    input[type="text"] {
      flex: 1;
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 1rem;
      padding: 11px 14px;
      outline: none;
      -webkit-appearance: none;
    }
    input[type="text"]:focus { border-color: #7dd3fc; }

    /* ---- Buttons ---- */
    .btn-primary {
      background: #2255aa;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      padding: 12px 20px;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary:active { background: #3366cc; }
    .btn-primary:disabled { opacity: 0.38; cursor: not-allowed; }

    .btn-secondary {
      background: #1a1a2e;
      color: #aaa;
      border: 2px solid #2a2a4a;
      border-radius: 10px;
      font-size: 1rem;
      padding: 10px 16px;
      cursor: pointer;
    }
    .btn-secondary:active { background: #222238; }

    .hint { font-size: 0.7rem; color: #555; text-align: center; margin-top: 4px; }

    .wifi-notice {
      font-size: 0.75rem;
      color: #4ade80;
      text-align: center;
      margin-bottom: 6px;
      opacity: 0.8;
    }

    .wifi-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 10px 14px;
      width: 100%;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .wifi-card-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .wifi-ssid {
      font-size: 0.75rem;
      color: #888;
    }
    .wifi-password {
      font-size: 1rem;
      font-weight: 700;
      color: #f0f0f0;
      letter-spacing: 0.04em;
      font-family: 'Courier New', monospace;
    }
    .btn-copy {
      background: #2a2a4a;
      border: none;
      border-radius: 8px;
      color: #7dd3fc;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 8px 12px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-copy:active { background: #3a3a6a; }
    .btn-copy.copied { color: #4ade80; }

    /* ---- Connecting view ---- */
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #2a2a4a;
      border-top-color: #7dd3fc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 40px auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #connect-status { color: #888; text-align: center; font-size: 0.9rem; }

    /* ---- Main control view ---- */
    #my-char-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
      padding: 12px 20px;
      background: #1a1a2e;
      border-radius: 12px;
      width: 100%;
    }
    .preview-sprite-wrap {
      width: 40px; height: 36px;
      display: flex; align-items: flex-end; justify-content: center;
      overflow: hidden;
    }
    .preview-sprite {
      width: 1px; height: 1px; flex-shrink: 0; margin-bottom: 10px;
      image-rendering: pixelated;
    }
    .preview-sprite.anim-walk  { animation: csWalk  0.6s ease-in-out infinite; }
    .preview-sprite.anim-stomp { animation: csStomp 0.35s steps(1) infinite; }
    .preview-sprite.anim-bob   { animation: csBob   0.9s ease-in-out infinite; }
    .preview-sprite.anim-hover { animation: csHover 1.4s ease-in-out infinite; }

    #my-char-name {
      font-size: 0.8rem;
      color: #aaa;
      text-align: center;
    }
    #my-char-name strong { color: #f0f0f0; }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #666;
      align-self: flex-start;
      margin-bottom: 8px;
    }

    /* Sentence buttons */
    #sentence-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
      margin-bottom: 18px;
    }
    .sentence-btn {
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 1rem;
      font-weight: 600;
      padding: 10px 10px;
      cursor: pointer;
      text-align: center;
      line-height: 1.5;
      -webkit-tap-highlight-color: transparent;
      overflow: visible;
    }
    .sentence-btn:active {
      background: #223355;
      border-color: #7dd3fc;
      transform: scale(0.97);
    }

    /* ---- Gamepad layout ---- */
    #gamepad-area {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      width: 100%;
      margin-bottom: 20px;
      gap: 12px;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Left column: joystick */
    #joystick-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      flex-shrink: 0;
    }
    #joystick-base {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      touch-action: none;
    }
    #joystick-knob {
      position: absolute;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #3a3a6a;
      border: 2px solid #7dd3fc;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: transform 0.05s ease;
    }
    #joystick-knob.returning {
      transition: transform 0.2s ease;
    }

    /* Right column: action buttons */
    #action-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex: 1;
    }
    #btn-push {
      width: 100%;
      background: #3a1a1a;
      border: 2px solid #aa3333;
      border-radius: 10px;
      color: #ff8888;
      font-size: 1.1rem;
      font-weight: 900;
      padding: 14px 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      letter-spacing: 0.05em;
    }
    #btn-push:active { background: #551111; }
    #btn-push.cooldown { opacity: 0.4; pointer-events: none; }
    @keyframes pushMiss {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-6px); }
      60%     { transform: translateX(6px); }
    }
    #btn-push.shake { animation: pushMiss 0.3s ease-out; }

    #btn-emote {
      width: 100%;
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 1.4rem;
      padding: 12px 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      text-align: center;
    }
    #btn-emote:active { background: #223355; border-color: #7dd3fc; }

    /* Mini emote preview row */
    #emote-preview {
      display: flex;
      gap: 6px;
      justify-content: center;
    }
    .emote-preview-dot {
      font-size: 1.1rem;
      opacity: 0.5;
    }

    /* ---- Radial wheel overlay ---- */
    #emote-wheel-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      touch-action: none;
    }
    #emote-wheel-overlay.open { display: block; }
    #emote-wheel-bg {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .emote-wheel-item {
      position: absolute;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .emote-wheel-item.highlighted {
      transform: translate(-50%, -50%) scale(1.3);
      box-shadow: 0 0 0 3px #7dd3fc;
    }
    .emote-wheel-item.empty {
      opacity: 0.2;
    }

    /* Status dot */
    #conn-status {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.25);
      text-align: center;
      margin-top: auto;
      padding-top: 8px;
    }
    #conn-status.connected { color: rgba(74,222,128,0.5); }

    /* Reconnect overlay */
    #reconnect-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 99;
    }
    #reconnect-overlay.visible { display: flex; }
    #reconnect-overlay p { color: #aaa; font-size: 0.9rem; }
  </style>
</head>
<body>

  <!-- Screen 1: Character selection -->
  <div id="view-select" class="view active">
    <h1>Bli med i showet!</h1>
    <p class="subtitle">Vel ein karakter og skriv inn namnet ditt</p>
    <p class="wifi-notice">📶 Koble til WiFi for best tilkopling</p>
    <div class="wifi-card">
      <div class="wifi-card-info">
        <span class="wifi-ssid">Conference</span>
        <span class="wifi-password">ThSSh2o2i!</span>
      </div>
      <button class="btn-copy" id="btn-copy-wifi">Kopier</button>
    </div>
    <div id="char-grid"></div>
    <div class="input-row">
      <input type="text" id="name-input" maxlength="16" placeholder="Ditt namn" autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="btn-primary" id="btn-join" disabled>Bli med!</button>
    </div>
    <p class="hint">Namnet ditt vises under karakteren din på storskjermen</p>
  </div>

  <!-- Screen 2: Connecting -->
  <div id="view-connecting" class="view">
    <div class="spinner"></div>
    <p id="connect-status">Koplar til presentasjonen…</p>
  </div>

  <!-- Screen 3: Main control -->
  <div id="view-main" class="view">
    <div id="my-char-preview">
      <div class="preview-sprite-wrap">
        <div class="preview-sprite" id="preview-sprite"></div>
      </div>
      <p id="my-char-name"></p>
    </div>

    <div class="section-label">Si noko</div>
    <div id="sentence-grid"></div>

    <div id="gamepad-area">
      <!-- Left: joystick -->
      <div id="joystick-wrap">
        <div id="joystick-base">
          <div id="joystick-knob"></div>
        </div>
      </div>

      <!-- Right: action buttons -->
      <div id="action-col">
        <button id="btn-push">DYTT!</button>
        <button id="btn-emote">😀</button>
        <div id="emote-preview"></div>
      </div>
    </div>

    <!-- Radial wheel overlay (always in DOM, hidden) -->
    <div id="emote-wheel-overlay">
      <div id="emote-wheel-bg"></div>
    </div>

    <div id="conn-status">○ frakopla</div>
  </div>

  <!-- Reconnect overlay -->
  <div id="reconnect-overlay">
    <p>Mista tilkoplinga…</p>
    <button class="btn-primary" id="btn-reconnect">Kopla til på nytt</button>
    <button class="btn-secondary" id="btn-reselect">Vel ny karakter</button>
  </div>

  <script src="assets/js/audience-config.js"></script>
  <script>
  (function () {
    'use strict';

    var selectedCharId = null;
    var myName = '';
    var ws = null;

    // ---- Restore session ----
    var saved = {};
    try { saved = JSON.parse(localStorage.getItem('audience-session') || '{}'); } catch (e) {}

    // ---- Build character grid ----
    var grid = document.getElementById('char-grid');
    (window.AUDIENCE_CHARACTERS || []).forEach(function (char) {
      var card = document.createElement('div');
      card.className = 'char-card';
      card.dataset.charId = char.id;

      var spriteWrap = document.createElement('div');
      spriteWrap.className = 'char-sprite-wrap';
      var sprite = document.createElement('div');
      sprite.className = 'char-sprite anim-' + (char.anim || 'walk');
      sprite.style.boxShadow = char.shadow;
      spriteWrap.appendChild(sprite);

      var label = document.createElement('div');
      label.className = 'char-label';
      label.textContent = char.label;

      var desc = document.createElement('div');
      desc.className = 'char-desc';
      desc.textContent = char.desc;

      card.appendChild(spriteWrap);
      card.appendChild(label);
      card.appendChild(desc);

      card.addEventListener('click', function () {
        document.querySelectorAll('.char-card').forEach(function (c) { c.classList.remove('selected'); });
        card.classList.add('selected');
        selectedCharId = char.id;
        checkJoinReady();
      });

      grid.appendChild(card);

      // Restore saved selection
      if (saved.charId === char.id) {
        card.click();
      }
    });

    // Pre-select first character if nothing was restored
    if (!selectedCharId) {
      var firstCard = grid.querySelector('.char-card');
      if (firstCard) firstCard.click();
    }

    // ---- Build sentence buttons ----
    var sentenceGrid = document.getElementById('sentence-grid');
    (window.AUDIENCE_SENTENCES || []).forEach(function (s) {
      var btn = document.createElement('button');
      btn.className = 'sentence-btn';
      btn.textContent = s.text;
      btn.addEventListener('click', function () {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'audience-speak', sentenceId: s.id }));
      });
      sentenceGrid.appendChild(btn);
    });

    // ---- Build radial wheel items + emote preview ----
    var WHEEL_EMOTES = window.AUDIENCE_EMOTES || [];
    var WHEEL_SLOTS = 6;
    var WHEEL_RADIUS = 56;
    var WHEEL_VISUAL_R = 80;
    var wheelOverlay = document.getElementById('emote-wheel-overlay');
    var wheelBg = document.getElementById('emote-wheel-bg');
    var wheelItems = [];

    for (var wi = 0; wi < WHEEL_SLOTS; wi++) {
      var wAngle = (wi * 60 - 90) * Math.PI / 180;
      var wItem = document.createElement('div');
      wItem.className = 'emote-wheel-item' + (wi >= WHEEL_EMOTES.length ? ' empty' : '');
      if (wi < WHEEL_EMOTES.length) wItem.textContent = WHEEL_EMOTES[wi].emoji;
      wheelItems.push({ el: wItem, angle: wAngle, emote: WHEEL_EMOTES[wi] || null });
      wheelOverlay.appendChild(wItem);
    }

    var emotePreviewRow = document.getElementById('emote-preview');
    WHEEL_EMOTES.slice(0, 4).forEach(function (e) {
      var dot = document.createElement('span');
      dot.className = 'emote-preview-dot';
      dot.textContent = e.emoji;
      emotePreviewRow.appendChild(dot);
    });

    // ---- Name input ----
    var nameInput = document.getElementById('name-input');
    nameInput.value = saved.name || '';
    nameInput.addEventListener('input', function () {
      myName = nameInput.value.trim();
      checkJoinReady();
    });

    // ---- WiFi copy button ----
    document.getElementById('btn-copy-wifi').addEventListener('click', function () {
      var btn = this;
      navigator.clipboard.writeText('ThSSh2o2i!').then(function () {
        btn.textContent = '✓ Kopiert!';
        btn.classList.add('copied');
        setTimeout(function () {
          btn.textContent = 'Kopier';
          btn.classList.remove('copied');
        }, 2000);
      });
    });

    function checkJoinReady() {
      myName = nameInput.value.trim();
      document.getElementById('btn-join').disabled = !(selectedCharId && myName.length > 0);
    }

    // ---- Join button ----
    document.getElementById('btn-join').addEventListener('click', function () {
      myName = nameInput.value.trim().slice(0, 16);
      if (!selectedCharId || !myName) return;
      localStorage.setItem('audience-session', JSON.stringify({ charId: selectedCharId, name: myName }));
      connect();
    });

    // ---- View switching ----
    function showView(id) {
      document.querySelectorAll('.view').forEach(function (v) { v.classList.remove('active'); });
      document.getElementById(id).classList.add('active');
    }

    // ---- Setup main view ----
    function setupMainView() {
      var char = (window.AUDIENCE_CHARACTERS || []).find(function (c) { return c.id === selectedCharId; });
      if (char) {
        var preview = document.getElementById('preview-sprite');
        preview.style.boxShadow = char.shadow;
        preview.className = 'preview-sprite anim-' + (char.anim || 'walk');
      }
      var nameEl = document.getElementById('my-char-name');
      nameEl.innerHTML = '<strong>' + escapeHtml(myName) + '</strong> — ' + (char ? char.label : '');
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ---- Virtual joystick ----
    var facingDir = 'right';
    var joystickActive = false;
    var joystickOriginX = 0, joystickOriginY = 0;
    var joystickMoveInterval = null;
    var joystickDir = null;
    var joystickBase = document.getElementById('joystick-base');
    var joystickKnob = document.getElementById('joystick-knob');
    var JOYSTICK_RADIUS = 40;
    var JOYSTICK_DEADZONE = 12;

    function joystickSendMove() {
      if (joystickDir && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'audience-move', direction: joystickDir }));
        if (joystickDir === 'left') facingDir = 'left';
        if (joystickDir === 'right') facingDir = 'right';
      }
    }

    function joystickStop() {
      joystickActive = false;
      joystickDir = null;
      if (joystickMoveInterval) { clearInterval(joystickMoveInterval); joystickMoveInterval = null; }
      joystickKnob.classList.add('returning');
      joystickKnob.style.transform = 'translate(-50%, -50%)';
      setTimeout(function () { joystickKnob.classList.remove('returning'); }, 220);
    }

    joystickBase.addEventListener('pointerdown', function (e) {
      e.preventDefault();
      joystickBase.setPointerCapture(e.pointerId);
      var rect = joystickBase.getBoundingClientRect();
      joystickOriginX = rect.left + rect.width / 2;
      joystickOriginY = rect.top + rect.height / 2;
      joystickActive = true;
      joystickKnob.classList.remove('returning');
    });

    joystickBase.addEventListener('pointermove', function (e) {
      if (!joystickActive) return;
      var dx = e.clientX - joystickOriginX;
      var dy = e.clientY - joystickOriginY;
      var dist = Math.hypot(dx, dy);

      var clampedX = dx, clampedY = dy;
      if (dist > JOYSTICK_RADIUS) {
        clampedX = (dx / dist) * JOYSTICK_RADIUS;
        clampedY = (dy / dist) * JOYSTICK_RADIUS;
      }
      joystickKnob.style.transform = 'translate(calc(-50% + ' + clampedX + 'px), calc(-50% + ' + clampedY + 'px))';

      if (dist < JOYSTICK_DEADZONE) {
        joystickDir = null;
        if (joystickMoveInterval) { clearInterval(joystickMoveInterval); joystickMoveInterval = null; }
        return;
      }

      var newDir;
      if (Math.abs(dx) > Math.abs(dy)) {
        newDir = dx > 0 ? 'right' : 'left';
      } else {
        newDir = dy > 0 ? 'down' : 'up';
      }

      if (newDir !== joystickDir) {
        joystickDir = newDir;
        if (joystickMoveInterval) { clearInterval(joystickMoveInterval); joystickMoveInterval = null; }
        joystickSendMove();
        joystickMoveInterval = setInterval(joystickSendMove, 100);
      }
    });

    joystickBase.addEventListener('pointerup', function () { joystickStop(); });
    joystickBase.addEventListener('pointercancel', function () { joystickStop(); });

    // ---- DYTT! push button ----
    var btnPush = document.getElementById('btn-push');

    btnPush.addEventListener('click', function () {
      if (btnPush.classList.contains('cooldown')) return;
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'audience-push', facingDir: facingDir }));
      }
      btnPush.classList.add('cooldown');
      setTimeout(function () { btnPush.classList.remove('cooldown'); }, 1500);
    });

    // ---- Radial wheel logic ----
    var btnEmote = document.getElementById('btn-emote');
    var wheelOpen = false;
    var wheelCx = 0, wheelCy = 0;
    var wheelHoldTimer = null;
    var wheelPointerId = null;
    var wheelStartX = 0, wheelStartY = 0;
    var highlightedIdx = -1;
    var WHEEL_HOLD_MS = 200;
    var WHEEL_CANCEL_DIST = 8;
    var WHEEL_DEADZONE = 20;

    function openWheel(cx, cy) {
      wheelOpen = true;
      var vw = window.innerWidth, vh = window.innerHeight;
      wheelCx = Math.min(Math.max(cx, WHEEL_VISUAL_R), vw - WHEEL_VISUAL_R);
      wheelCy = Math.min(Math.max(cy, WHEEL_VISUAL_R), vh - WHEEL_VISUAL_R);
      wheelBg.style.left = wheelCx + 'px';
      wheelBg.style.top  = wheelCy + 'px';
      wheelItems.forEach(function (item) {
        var ix = wheelCx + Math.cos(item.angle) * WHEEL_RADIUS;
        var iy = wheelCy + Math.sin(item.angle) * WHEEL_RADIUS;
        item.el.style.left = ix + 'px';
        item.el.style.top  = iy + 'px';
        item.el.classList.remove('highlighted');
      });
      wheelOverlay.classList.add('open');
    }

    function closeWheel() {
      wheelOpen = false;
      highlightedIdx = -1;
      wheelOverlay.classList.remove('open');
      wheelItems.forEach(function (item) { item.el.classList.remove('highlighted'); });
    }

    function updateWheelHighlight(px, py) {
      var dx = px - wheelCx, dy = py - wheelCy;
      var dist = Math.hypot(dx, dy);
      if (dist < WHEEL_DEADZONE) {
        if (highlightedIdx !== -1) {
          wheelItems[highlightedIdx].el.classList.remove('highlighted');
          highlightedIdx = -1;
        }
        return;
      }
      var angle = Math.atan2(dy, dx);
      var best = -1, bestDiff = Infinity;
      wheelItems.forEach(function (item, i) {
        if (!item.emote) return;
        var diff = Math.abs(((angle - item.angle) + Math.PI * 3) % (Math.PI * 2) - Math.PI);
        if (diff < bestDiff) { bestDiff = diff; best = i; }
      });
      if (best !== highlightedIdx) {
        if (highlightedIdx !== -1) wheelItems[highlightedIdx].el.classList.remove('highlighted');
        highlightedIdx = best;
        if (best !== -1) wheelItems[best].el.classList.add('highlighted');
      }
    }

    btnEmote.addEventListener('pointerdown', function (e) {
      e.preventDefault();
      btnEmote.setPointerCapture(e.pointerId);
      wheelPointerId = e.pointerId;
      wheelStartX = e.clientX;
      wheelStartY = e.clientY;
      wheelHoldTimer = setTimeout(function () {
        btnEmote.releasePointerCapture(wheelPointerId);
        openWheel(wheelStartX, wheelStartY);
        wheelOverlay.setPointerCapture(wheelPointerId);
      }, WHEEL_HOLD_MS);
    });

    btnEmote.addEventListener('pointermove', function (e) {
      if (!wheelHoldTimer) return;
      if (Math.hypot(e.clientX - wheelStartX, e.clientY - wheelStartY) > WHEEL_CANCEL_DIST) {
        clearTimeout(wheelHoldTimer);
        wheelHoldTimer = null;
      }
    });

    btnEmote.addEventListener('pointerup', function () {
      if (wheelHoldTimer) { clearTimeout(wheelHoldTimer); wheelHoldTimer = null; }
    });

    btnEmote.addEventListener('pointercancel', function () {
      if (wheelHoldTimer) { clearTimeout(wheelHoldTimer); wheelHoldTimer = null; }
    });

    wheelOverlay.addEventListener('pointermove', function (e) {
      if (!wheelOpen) return;
      updateWheelHighlight(e.clientX, e.clientY);
    });

    wheelOverlay.addEventListener('pointerup', function () {
      if (!wheelOpen) return;
      if (highlightedIdx !== -1 && wheelItems[highlightedIdx].emote) {
        var emoteId = wheelItems[highlightedIdx].emote.id;
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'audience-emote', emoteId: emoteId }));
        }
      }
      closeWheel();
    });

    wheelOverlay.addEventListener('pointercancel', function () {
      closeWheel();
    });

    // ---- Reconnect/reselect ----
    document.getElementById('btn-reconnect').addEventListener('click', function () {
      document.getElementById('reconnect-overlay').classList.remove('visible');
      showView('view-connecting');
      connect();
    });
    document.getElementById('btn-reselect').addEventListener('click', function () {
      document.getElementById('reconnect-overlay').classList.remove('visible');
      showView('view-select');
    });

    // ---- Connection status ----
    function setStatus(text, connected) {
      var el = document.getElementById('conn-status');
      el.textContent = connected ? '⬤ tilkopla' : '○ ' + text;
      el.className = connected ? 'connected' : '';
    }

    // ---- WebSocket connect ----
    function wsUrl() {
      return (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';
    }

    function connect() {
      showView('view-connecting');
      document.getElementById('connect-status').textContent = 'Koplar til presentasjonen…';

      if (ws) { try { ws.close(); } catch (e) {} }

      ws = new WebSocket(wsUrl());

      ws.addEventListener('open', function () {
        var resumeClientId = saved.clientId || undefined;
        ws.send(JSON.stringify({ type: 'audience-join', name: myName, charId: selectedCharId, resumeClientId: resumeClientId }));
        setupMainView();
        showView('view-main');
        setStatus('', true);
      });

      ws.addEventListener('message', function (e) {
        var data;
        try { data = JSON.parse(e.data); } catch { return; }
        if (data && data.type === 'connected') {
          saved.clientId = data.clientId;
          localStorage.setItem('audience-session', JSON.stringify(saved));
        }
        if (data && data.type === 'audience-update') {
          // could show member count if desired
        }
        if (data && data.type === 'audience-push-miss') {
          btnPush.classList.remove('shake');
          void btnPush.offsetWidth;
          btnPush.classList.add('shake');
          btnPush.addEventListener('animationend', function () {
            btnPush.classList.remove('shake');
          }, { once: true });
        }
      });

      ws.addEventListener('close', function () {
        setStatus('frakopla', false);
        document.getElementById('reconnect-overlay').classList.add('visible');
      });

      ws.addEventListener('error', function () {
        setStatus('feil', false);
        document.getElementById('connect-status').textContent = 'Tilkoplingsfeil. Er presentasjonen open?';
      });
    }
  })();
  </script>

  <script>
    // Disable pinch-to-zoom on iOS (ignores user-scalable=no since iOS 10)
    document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
    document.addEventListener('touchmove', function (e) {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
  </script>
</body>
