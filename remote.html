<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Remote — KFK 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f1a;
      color: #f0f0f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 1rem 1.25rem 1.5rem;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
      gap: 0.75rem;
    }

    #header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-shrink: 0;
    }

    #counter {
      font-size: 1rem;
      font-weight: 600;
      color: #888;
      font-variant-numeric: tabular-nums;
    }

    #timer {
      font-size: 1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #4ade80;
      letter-spacing: 0.04em;
      transition: color 0.4s;
    }
    #timer.warning { color: #fbbf24; }
    #timer.overtime { color: #f87171; }

    #notes {
      flex: 1;
      padding: 0.9rem 1.1rem;
      background: #1a1a2e;
      border-radius: 8px;
      font-size: 1.4rem;
      line-height: 1.7;
      text-align: left;
      overflow-y: auto;
      min-height: 0;
    }
    #notes:empty { display: none; }
    #notes .line { margin-bottom: 0.6rem; }
    #notes .line:last-child { margin-bottom: 0; }
    #notes .speaker { font-weight: 700; margin-right: 0.3em; }
    #notes .henry .speaker { color: #60a5fa; }
    #notes .ahmed .speaker { color: #fb923c; }

    #no-id {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      text-align: center;
      color: #666;
    }
    #no-id p { max-width: 260px; line-height: 1.5; }

    .controls {
      display: flex;
      gap: 1.25rem;
      flex-shrink: 0;
    }

    button {
      flex: 1;
      padding: 1.75rem 0;
      font-size: 2.25rem;
      border: none;
      border-radius: 16px;
      background: #1e1e3a;
      color: #fff;
      cursor: pointer;
      transition: background 0.1s, transform 0.1s;
      touch-action: manipulation;
    }

    button:active {
      background: #2a2a50;
      transform: scale(0.95);
    }

    #btn-next {
      background: #1e3a8a;
    }
    #btn-next:active {
      background: #1d4ed8;
    }

    #log {
      display: none;
      flex-shrink: 0;
      max-height: 7rem;
      overflow-y: auto;
      font-size: 0.65rem;
      font-family: monospace;
      color: #f87171;
      line-height: 1.5;
      text-align: left;
    }
    #log.visible { display: block; }
  </style>
</head>
<body>
  <div id="header">
    <div id="counter">—/—</div>
    <div id="timer">15:00</div>
  </div>

  <div id="notes"></div>


  <div id="log"></div>

  <div class="controls">
    <button id="btn-prev" disabled>&#8592;</button>
    <button id="btn-next" disabled>&#8594;</button>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script>
    var params = new URLSearchParams(location.search);
    var targetId = params.get('id');

    var counterEl = document.getElementById('counter');
    var notesEl = document.getElementById('notes');

    var btnPrev = document.getElementById('btn-prev');
    var btnNext = document.getElementById('btn-next');
    var logEl = document.getElementById('log');

    var conn;

    function log(text, isError) {
      var ts = new Date().toISOString().substring(11, 19);
      var line = document.createElement('div');
      line.textContent = ts + ' ' + text;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
      if (isError) logEl.classList.add('visible');
    }

    function setConnected(c) {
      btnPrev.disabled = !c;
      btnNext.disabled = !c;
    }

    function send(action) {
      if (conn && conn.open) conn.send({ action: action });
    }

    btnPrev.addEventListener('click', function () { send('prev'); });
    btnNext.addEventListener('click', function () { send('next'); });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'ArrowLeft') send('prev');
      else if (e.key === 'ArrowRight' || e.key === ' ') send('next');
    });

    var timerEl = document.getElementById('timer');
    var TOTAL = 15 * 60;
    var timerInterval = null;

    function formatTime(seconds) {
      var abs = Math.abs(seconds);
      var m = Math.floor(abs / 60);
      var s = abs % 60;
      var str = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
      return seconds < 0 ? '+' + str : str;
    }

    function startTimerFrom(startedAt) {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(function () {
        var elapsed = Math.floor((Date.now() - startedAt) / 1000);
        var remaining = TOTAL - elapsed;
        timerEl.textContent = formatTime(remaining);
        timerEl.className = remaining < 0 ? 'overtime' : remaining < 120 ? 'warning' : '';
      }, 500);
    }

    function stopTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = null;
      timerEl.textContent = '15:00';
      timerEl.className = '';
    }

    if (targetId) {
      var peer = new Peer({ config: { iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
      ]}});

      peer.on('open', function (id) {
        log('Peer klar, id=' + id.substring(0, 8) + '…');
        conn = peer.connect(targetId, { reliable: true });

        conn.on('open', function () {
          log('Tilkoblet ✓');
          setConnected(true);
        });

        conn.on('data', function (data) {
          if (data.type === 'timer') { startTimerFrom(data.startedAt); return; }
          if (data.type === 'timer-stop') { stopTimer(); return; }
          if (data.type !== 'state') return;
          var current = (data.h || 0) + 1;
          counterEl.textContent = current + ' / ' + (data.total || '?');
          if (data.notes) {
            notesEl.innerHTML = data.notes.split('\n').filter(function(l) { return l.trim(); }).map(function(line) {
              var m = line.match(/^(Henry|Ahmed):\s*(.*)/);
              if (!m) return '<p class="line"><span style="color:#aaa">' + line + '</span></p>';
              var who = m[1].toLowerCase();
              return '<p class="line ' + who + '"><span class="speaker">' + m[1] + ':</span><span style="color:#e2e8f0">' + m[2] + '</span></p>';
            }).join('');
          } else {
            notesEl.innerHTML = '';
          }
        });

        conn.on('close', function () {
          log('Kobling lukket', true);
          setConnected(false);
        });

        conn.on('error', function (err) {
          log('Koblingsfeil: ' + (err && err.message ? err.message : err), true);
          setConnected(false);
        });

        conn.peerConnection && conn.peerConnection.addEventListener('iceconnectionstatechange', function () {
          log('ICE: ' + conn.peerConnection.iceConnectionState);
        });
      });

      peer.on('error', function (err) {
        log('Peer-feil: ' + err.type + (err.message ? ' — ' + err.message : ''), true);
        setConnected(false);
      });
    }
  </script>
</body>
</html>
