app = "kfk-lokalcamp-2026"
primary_region = "arn"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "sqlite_data"
  destination = "/data"
  initial_size = "1gb"

[env]
  PORT = "8080"
  DB_PATH = "/data/events.db"
