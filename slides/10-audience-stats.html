<section id="slide-audience-stats" style="text-align:center;">
  <h2>Publikumsrapport 📊</h2>
  <p style="color:#555;margin-bottom:0.75rem;font-size:0.7em;">Kva skjedde eigentleg?</p>

  <div id="audience-stats-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;margin-bottom:0.6rem;">
    <div class="stat-card" id="stat-participants">
      <div class="stat-number">—</div>
      <div class="stat-label">deltakarar</div>
    </div>
    <div class="stat-card" id="stat-messages">
      <div class="stat-number">—</div>
      <div class="stat-label">meldingar</div>
    </div>
    <div class="stat-card" id="stat-moves">
      <div class="stat-number">—</div>
      <div class="stat-label">forflyttingar</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:0.8rem;">
    <div class="stat-card" id="stat-top-sentence">
      <div class="stat-emoji">💬</div>
      <div class="stat-highlight">—</div>
      <div class="stat-label">mest sagt</div>
    </div>
    <div class="stat-card" id="stat-top-emote">
      <div class="stat-emoji">—</div>
      <div class="stat-highlight"></div>
      <div class="stat-label">mest brukt emote</div>
    </div>
  </div>

  <!-- Podium: top 3 — rendered by audience-manager.js -->
  <div id="stat-podium" style="margin-bottom:0.6rem;"></div>

  <!-- All participants: rendered by audience-manager.js -->
  <div id="stat-participant-list"></div>

  <style>
    .stat-card {
      background: rgba(0,0,0,0.07);
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 12px;
      padding: 0.6rem 0.5rem;
    }
    .stat-number { font-size: 2.2em; font-weight: 900; color: #1d4ed8; line-height: 1; }
    .stat-emoji  { font-size: 1.5em; line-height: 1.4; }
    .stat-highlight { font-size: 0.9em; font-weight: 700; color: #111; margin: 0.15em 0; }
    .stat-label  { font-size: 0.5em; color: #444; text-transform: uppercase; letter-spacing: 0.08em; }

    /* ---- Podium ---- */
    #stat-podium {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0.4rem;
    }
    .podium-slot { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .podium-sprite-wrap {
      width: 30px; height: 28px;
      display: flex; align-items: flex-end; justify-content: center; overflow: visible;
    }
    .podium-sprite {
      width: 1px; height: 1px; flex-shrink: 0;
      margin-bottom: 13px; image-rendering: pixelated;
    }
    .podium-sprite.anim-walk  { animation: partyWalk  0.55s ease-in-out infinite; }
    .podium-sprite.anim-stomp { animation: partyStomp 0.35s steps(1) infinite; }
    .podium-sprite.anim-bob   { animation: partyBob   0.9s  ease-in-out infinite; }
    .podium-sprite.anim-hover { animation: partyHover 1.4s  ease-in-out infinite; }
    .podium-name  { font-size: 0.4em; font-weight: 700; color: #111; white-space: nowrap; max-width: 78px; overflow: hidden; text-overflow: ellipsis; }
    .podium-count { font-size: 0.35em; color: #666; }
    .podium-block {
      border-radius: 6px 6px 0 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2em; font-weight: 900;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    .podium-1st .podium-block { height: 68px; width: 88px; background: linear-gradient(to bottom,#fde68a,#f59e0b); color: #78350f; }
    .podium-2nd .podium-block { height: 50px; width: 78px; background: linear-gradient(to bottom,#e5e7eb,#9ca3af); color: #374151; }
    .podium-3rd .podium-block { height: 36px; width: 78px; background: linear-gradient(to bottom,#fcd9a0,#cd7f32); color: #7c3a00; }

    /* ---- Participant list ---- */
    #stat-participant-list {
      display: flex; flex-wrap: wrap; gap: 5px; justify-content: center;
      max-height: 72px; overflow: hidden;
    }
    .plist-card {
      display: flex; align-items: center; gap: 4px;
      background: rgba(0,0,0,0.06); border-radius: 8px;
      padding: 2px 7px 2px 3px; font-size: 0.4em;
    }
    .plist-sprite-wrap {
      width: 16px; height: 16px;
      display: flex; align-items: flex-end; justify-content: center;
      overflow: visible; flex-shrink: 0;
    }
    .plist-sprite {
      width: 1px; height: 1px; flex-shrink: 0;
      margin-bottom: 7px; image-rendering: pixelated;
    }
    .plist-sprite.anim-walk  { animation: plistWalk  0.55s ease-in-out infinite; }
    .plist-sprite.anim-stomp { animation: plistStomp 0.35s steps(1) infinite; }
    .plist-sprite.anim-bob   { animation: plistBob   0.9s  ease-in-out infinite; }
    .plist-sprite.anim-hover { animation: plistHover 1.4s  ease-in-out infinite; }
    @keyframes plistWalk  { 0%,100%{transform:scale(1) translateY(0)} 50%{transform:scale(1) translateY(-1px)} }
    @keyframes plistStomp { 0%,100%{transform:scale(1) translateY(0)} 50%{transform:scale(1) translateY(-1px)} }
    @keyframes plistBob   { 0%,100%{transform:scale(1) rotate(-4deg)} 50%{transform:scale(1) rotate(4deg)} }
    @keyframes plistHover { 0%,100%{transform:scale(1) translateY(0)} 50%{transform:scale(1) translateY(-2px)} }
    .plist-name  { font-weight: 700; color: #111; }
    .plist-count { color: #888; margin-left: 2px; }
  </style>

  <aside class="notes">Vis statistikk frå publikumsinteraksjonen. Pallen viser topp 3 mest aktive deltakarar.</aside>
</section>
